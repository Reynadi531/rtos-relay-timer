name: Build & Release Firmware

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e nanoatmega328

      - name: Prepare release assets
        run: |
          cp .pio/build/nanoatmega328/firmware.hex pump-timer-rtos.hex
          cp .pio/build/nanoatmega328/firmware.elf pump-timer-rtos.elf

      - name: Generate version tag
        id: version
        run: |
          echo "tag=v$(date -u +%Y.%m.%d)-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Firmware ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            pump-timer-rtos.hex
            pump-timer-rtos.elf
